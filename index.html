<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LyricFlow — Learn Languages Through Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="player-wrapper" id="app"></div>
  <script type="module" src="player.js"></script>
  <script>
    (function() {
      const saved = localStorage.getItem('lf-theme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      const btn = document.getElementById('themeToggle');
      function update() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.textContent = isDark ? '☀️' : '🌙';
      }
      update();
      btn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
        localStorage.setItem('lf-theme', isDark ? '' : 'dark');
        update();
      });
    })();
  </script>
</body>
</html>
