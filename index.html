<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LyricFlow — Learn Languages Through Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <meta name="description" content="LyricFlow — Learn languages through music with synced lyrics, fill-in-the-blank exercises, and immersive listening.">
  <script>var p=new URLSearchParams(location.search).get('theme'),t=p||localStorage.getItem('lp-theme');if(p)localStorage.setItem('lp-theme',p);if(t==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="player-wrapper" id="app"></div>
  <script type="module" src="player.js"></script>
  <script>
    // Apply saved theme immediately (before player.js loads)
    (function() {
      const saved = localStorage.getItem('lp-theme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      // Local dev: portal link rewrite handled in player.js
    })();
  </script>
</body>
</html>
